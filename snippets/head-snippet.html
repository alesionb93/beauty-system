<!-- ============================================================
     Cole este bloco dentro do <head> de TODAS as suas páginas
     (index.html, agenda.html, pacotes.html, etc.)
     ============================================================ -->

<!-- Manifest do PWA -->
<link rel="manifest" href="manifest.json" />

<!-- Cor da barra do navegador / sistema -->
<meta name="theme-color" content="#7a1f5c" />

<!-- iOS: comportamento de "app instalado" -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Beauty System" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

<!-- Ícones gerais -->
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />

<!-- Mobile-friendly (caso ainda não tenha) -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<!-- ============================================================
     E antes do </body>, adicione:
     <script src="pwa.js" defer></script>
     ============================================================ -->
