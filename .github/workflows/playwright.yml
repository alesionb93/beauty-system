name: Slotify Regression

on:
  push:
    branches:
      - main

jobs:
  playwright:
    runs-on: ubuntu-latest

    env:
      BASE_URL: https://slotify.pilotodigital.online
      TZ: America/Sao_Paulo
      LANG: pt_BR.UTF-8
      LC_ALL: pt_BR.UTF-8
      CI: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Testes regressivos
        run: npx playwright test specs --workers=1
        env:
          QA_SLOTIFY_USER: ${{ secrets.QA_SLOTIFY_USER }}
          QA_SLOTIFY_PASS: ${{ secrets.QA_SLOTIFY_PASS }}

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/